name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
      EMAIL_USE_TLS: ${{ secrets.EMAIL_USE_TLS }}
      EMAIL_HOST_USER: ${{ secrets.EMAIL_HOST_USER }}
      EMAIL_HOST_PASSWORD: ${{ secrets.EMAIL_HOST_PASSWORD }}
      DEFAULT_FROM_EMAIL: ${{ secrets.DEFAULT_FROM_EMAIL }}
      SERVER_EMAIL: ${{ secrets.SERVER_EMAIL }}

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
        
    - name: Install dependencies
      run: |
        poetry install --no-interaction
        
    - name: Run tests
      run: |
        poetry run python manage.py test
        
    - name: Deploy to production
      uses: appleboy/ssh-action@v1.0.0
      env:
        META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
        META_CAPI_TOKEN: ${{ secrets.META_CAPI_TOKEN }}
        ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        envs: META_PIXEL_ID,META_CAPI_TOKEN,ALLOWED_HOSTS
        script: |
          # Set up environment
          export PATH="$HOME/.local/bin:$PATH"

          # Fix Git safe directory issue
          git config --global --add safe.directory /var/www/artwebsite

          # Navigate to project directory
          cd /var/www/artwebsite || exit 1

          # Update code
          git fetch
          git reset --hard origin/main

          # Sync managed config keys from GitHub Secrets into .env
          # (upsert: replaces or appends ONLY the keys listed below;
          #  every other line in .env is preserved untouched)
          touch .env
          for key in META_PIXEL_ID META_CAPI_TOKEN ALLOWED_HOSTS; do
            value="${!key}"
            if [ -z "$value" ]; then
              echo "WARNING: secret $key is empty - leaving existing .env value untouched"
              continue
            fi
            grep -v "^${key}=" .env > .env.tmp || true
            printf '%s=%s\n' "$key" "$value" >> .env.tmp
            mv .env.tmp .env
          done
          chown www-data:www-data .env
          chmod 600 .env

          # Install dependencies
          if [ -f "pyproject.toml" ]; then
              poetry install --no-interaction
              
              # Run migrations and collect static files
              poetry run python manage.py migrate
              poetry run python manage.py collectstatic --noinput
              
              # Restart Gunicorn
              sudo systemctl restart gunicorn
              
              echo "Deployment successful!"
          else
              echo "Error: pyproject.toml not found!"
              exit 1
          fi