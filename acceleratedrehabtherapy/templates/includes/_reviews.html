<!-- acceleratedrehabtherapy/templates/includes/_reviews.html -->
<section class="text-white"
         x-data="{
            currentSlide: 0,
            reviews: [],
            loaded: false,
            error: null,
            async fetchReviews() {
                try {
                    const response = await fetch('/api/reviews/');
                    const data = await response.json();
                    if (data.status === 'success') {
                        this.reviews = data.reviews;
                    } else {
                        this.error = data.message || 'Failed to load reviews';
                    }
                } catch (error) {
                    this.error = error.message;
                }
                this.loaded = true;
            },
            init() {
                this.fetchReviews();
            }
         }">
    <div class="lp-review-shell">
        <div class="lp-review-inner">
            <h2 class="text-4xl font-bold text-center mb-4 text-white">
                WHAT OUR PATIENTS ARE SAYING
            </h2>

            <div x-show="error" class="bg-red-600 text-white p-4 rounded mb-4" x-text="error"></div>

            <div class="relative" x-show="loaded">
                <div class="lp-review-grid">
                    <template x-for="(review, index) in reviews.slice(currentSlide * 2, (currentSlide * 2) + 2)" :key="index">
                        <div class="lp-review-card">
                            <div class="lp-review-stars">
                                <template x-for="star in 5">
                                    <span>&#9733;</span>
                                </template>
                            </div>

                            <p class="lp-review-text" x-text="review.text"></p>

                            <div class="mt-4">
                                <p class="text-lg font-bold" x-text="review.author"></p>
                                <p class="text-sm text-gray-300" x-text="review.profession || review.type || 'Patient'"></p>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="flex items-center justify-between mt-8">
                    <button @click="currentSlide = Math.max(currentSlide - 1, 0)"
                            class="p-2 text-white hover:text-yellow-400 disabled:opacity-50 disabled:cursor-not-allowed"
                            :disabled="currentSlide === 0"
                            aria-label="Previous review">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                        </svg>
                    </button>

                    <div class="text-center text-lg">
                        <span x-text="currentSlide + 1"></span> /
                        <span x-text="Math.ceil(reviews.length / 2)"></span>
                    </div>

                    <button @click="currentSlide = Math.min(currentSlide + 1, Math.ceil(reviews.length / 2) - 1)"
                            class="p-2 text-white hover:text-yellow-400 disabled:opacity-50 disabled:cursor-not-allowed"
                            :disabled="currentSlide >= Math.ceil(reviews.length / 2) - 1"
                            aria-label="Next review">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                        </svg>
                    </button>
                </div>

                <div class="lp-review-actions">
                    <a href="https://www.google.com/search?sca_esv=eaab408515b938ef&sxsrf=AE3TifOrRVlO-Xn38CeJgR2QTfTI1bdkNw:1762384875876&si=AMgyJEuzsz2NflaaWzrzdpjxXXRaJ2hfdMsbe_mSWso6src8s3w69iau5RwZaAdiFBKN2PDBleU3V82o5MjaUnl-YqhpIzykSVFKDf34I7Gk4S9zugT225kZds9ASjoBCDS9ehCgQbiSnLeSLQmeff-i-nLT8xVNWN7_DsSiWgaPw_LHvdlp92Q%3D&q=Accelerated+Rehab+Therapy+of+Greeley+CO+Reviews&sa=X&ved=2ahUKEwiruO-jk9yQAxUrX0EAHfCOEcMQ0bkNegQIKBAE&biw=1536&bih=706&dpr=1.25"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="lp-btn-solid">
                        Read Reviews on Google
                    </a>
                    <a href="https://www.google.com/search?sca_esv=8d68d2504fc7931b&sxsrf=AE3TifOFXeijfT4iuQLPDDwpkw9w2NbL8w:1762391609999&si=AMgyJEuzsz2NflaaWzrzdpjxXXRaJ2hfdMsbe_mSWso6src8s3w69iau5RwZaAdiFBKN2PDBleU3V82o5MjaUnl-YqhpIzykSVFKDf34I7Gk4S9zugT225kZds9ASjoBCDS9ehCgQbiSnLeSLQmeff-i-nLT8xVNWN7_DsSiWgaPw_LHvdlp92Q%3D&q=Accelerated+Rehab+Therapy+of+Greeley+CO+Reviews&sa=X&ved=2ahUKEwih3PmurNyQAxULX0EAHWThOGsQ0bkNegQIKxAE&biw=1536&bih=706&dpr=1.25#lrd=0x876ea3dd61bd4a43:0x723b34ff7c5418f2,3,,,,"
                       target="_blank"
                       rel="noopener noreferrer"
                       class="lp-btn-outline"
                       style="border-color:#fde047;color:#fde047;background:transparent;">
                        Leave a Review
                    </a>
                </div>
            </div>
        </div>

        <div x-show="!loaded" class="flex justify-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-white border-t-transparent"></div>
        </div>
    </div>
</section>
