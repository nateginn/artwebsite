{% comment %}
Styled image placeholder for landing pages.
Required context: image_label — descriptive text for the image needed.
Optional context: image_height — CSS min-height (default: 320px)
{% endcomment %}
<div class="img-placeholder" style="min-height: {{ image_height|default:'320px' }};">
    <svg class="w-12 h-12 mb-3 text-[#236E8C]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
    </svg>
    <p class="font-semibold text-sky-300 mb-1">Photo Needed</p>
    <p class="text-sky-400 text-xs max-w-xs">{{ image_label }}</p>
</div>
